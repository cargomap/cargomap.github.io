<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}">
<link rel="canonical" href="https://cargomap.github.io{{ page.url }}">
{% if page.noindex %}<meta name="robots" content="noindex">{% else %}<meta name="robots" content="index, follow">{% endif %}
<meta name="author" content="Bob Law">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Open Graph (LinkedIn / WhatsApp link previews) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Cargomap">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:url" content="https://cargomap.github.io{{ page.url }}">
<meta property="og:image" content="https://cargomap.github.io/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description }}">
<meta name="twitter:image" content="https://cargomap.github.io/og-image.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">

{% if page.url == "/" %}
<!-- Person schema lives on the homepage only -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Cargomap",
  "url": "https://cargomap.github.io/",
  "image": "https://cargomap.github.io/og-image.jpg",
  "description": "Personal professional notes by Bob Law, an ocean freight practitioner based in South China. Writing about trade lanes, documentation, and what buyers need to know.",
  "knowsLanguage": ["en", "zh", "yue"],
  "author": {
    "@type": "Person",
    "name": "Bob Law",
    "jobTitle": "Ocean Freight Forwarder",
    "sameAs": "https://www.linkedin.com/in/bob-law-3bba48403"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+8618676419641",
    "email": "lawcantonese@outlook.com",
    "availableLanguage": ["English", "Chinese"]
  },
  "sameAs": ["https://www.linkedin.com/in/bob-law-3bba48403"]
}
</script>
{% endif %}

</head>
<body>

<!-- route glyph reused: origin dot -> lane -> arrow -->
<svg width="0" height="0" style="position:absolute"><defs>
  <g id="glyph"><circle cx="3" cy="8" r="2.4" fill="currentColor"/><path d="M5.5 8 H16" stroke="currentColor" stroke-width="1.4"/><path d="M13 4.5 L17 8 L13 11.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></g>
</defs></svg>

{% include header.html %}

{% if page.url == "/" %}
<script>
// Legacy anchor compatibility: old links like /#iraq now route to their new pages.
(function(){
  var map = {'#vietnam':'/vietnam/', '#iraq':'/iraq/', '#about':'/about/', '#notes':'/field-notes/', '#faq':'/faq/'};
  var h = window.location.hash;
  if (h && map[h]) { window.location.replace(map[h]); }
})();
</script>
{% endif %}

{{ content }}

{% include sticky-cta.html %}

{% include footer.html %}

<script src="/assets/js/main.js"></script>
<script src="/assets/js/geo-block.js"></script>
</body>
</html>
